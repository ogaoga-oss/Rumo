<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumo</title>

 <style>
    body { font-family: sans-serif; background: linear-gradient(135deg,#4facfe,#00f2fe); color:#fff; text-align:center; }
    .section { margin:30px; padding:20px; border-radius:15px; background:rgba(0,0,0,0.2); animation:fadeIn 1s ease forwards; opacity:0; }
    button { margin:10px; padding:10px 20px; border:none; border-radius:10px; background:#fff; color:#333; font-weight:bold; cursor:pointer; transition:0.3s; }
    button:hover { background:#f0f0f0; transform:scale(1.05); }
    @keyframes fadeIn { to { opacity:1; } }
  </style>
</head>

<body>
  <div class="box">
    <h1>Rumo</h1>
    <p id="status">読み込み中...</p>
    <button class="btn" onclick="goInvite()">招待コードを入力</button>
  </div>

  <script>
    
    const status = document.getElementById("status");

    // 招待コード取得
    const params = new URLSearchParams(location.search);
    const invite = params.get("invite");

    if (invite) {
      localStorage.setItem("inviteCode", invite);
      status.innerText = "招待コード確認中...";
      
      // 少し待ってから遷移（UX改善）
      setTimeout(() => {
        location.href = "/pages/register.html";
      }, 800);

    } else {
      status.innerText = "招待コードが必要です";
    }

    function goInvite(){
      location.href = "/pages/invite.html";
    }
      
  </script>
    
</body>
</html>
