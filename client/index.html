<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumo</title>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    .box {
      text-align: center;
    }
    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Rumo</h1>
    <p id="status">読み込み中...</p>
    <button class="btn" onclick="goInvite()">招待コードを入力</button>
  </div>

  <script>
    
    const status = document.getElementById("status");

    // 招待コード取得
    const params = new URLSearchParams(location.search);
    const invite = params.get("invite");

    if (invite) {
      localStorage.setItem("inviteCode", invite);
      status.innerText = "招待コード確認中...";
      
      // 少し待ってから遷移（UX改善）
      setTimeout(() => {
        location.href = "/pages/register.html";
      }, 800);

    } else {
      status.innerText = "招待コードが必要です";
    }

    function goInvite(){
      location.href = "/pages/invite.html";
    }
      
  </script>
    
</body>
</html>
